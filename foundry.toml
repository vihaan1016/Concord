[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Solidity compiler settings
solc = "0.8.26"
evm_version = "cancun"
via_ir = false

# Optimizer settings
optimizer = true
optimizer_runs = 200

# Testing settings
ffi = true
verbosity = 2

# Formatter settings
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

# Sepolia RPC configuration
[rpc_endpoints]
sepolia = "${RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
